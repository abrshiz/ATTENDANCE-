name: qr_app
description: A QR Code Attendance Management System
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # QR Code
  qr_flutter: ^4.1.0

  # Scanner
  mobile_scanner: ^5.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Save to gallery
  gal: ^2.3.0

  # Date formatting
  intl: ^0.19.0

  # Share files
  share_plus: ^10.0.0

  # Local Database
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # UUID for unique IDs
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
